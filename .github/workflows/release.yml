name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Pre-release identifier (e.g., alpha, beta, rc)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            IS_PRERELEASE=$([[ "$TAG" =~ (alpha|beta|rc) ]] && echo "true" || echo "false")
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST_VERSION="${LATEST_TAG#v}"
            
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_VERSION%%-*}"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
            
            case "${{ inputs.version_type }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            
            if [[ -n "${{ inputs.prerelease }}" ]]; then
              VERSION="${VERSION}-${{ inputs.prerelease }}"
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
            
            TAG="v${VERSION}"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"
          echo "🏷️  Tag: ${TAG}"
          echo "🚀 Pre-release: ${IS_PRERELEASE}"

      - name: Update Cargo.toml versions
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          
          for crate_dir in crates/*/; do
            if [[ -f "${crate_dir}Cargo.toml" ]]; then
              sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" "${crate_dir}Cargo.toml"
            fi
          done
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: bump version to ${VERSION}"
          git push origin HEAD:main

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            archive: tar.gz
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build -p bifrost-cli --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        env:
          SKIP_FRONTEND_BUILD: "1"
        run: cross build -p bifrost-cli --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCHIVE_NAME="bifrost-v${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/bifrost" "dist/${ARCHIVE_NAME}/"
          cp README.md "dist/${ARCHIVE_NAME}/" 2>/dev/null || true
          cd dist
          tar -czvf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $ARCHIVE_NAME = "bifrost-v${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/${ARCHIVE_NAME}"
          Copy-Item "target/${{ matrix.target }}/release/bifrost.exe" "dist/${ARCHIVE_NAME}/"
          Copy-Item "README.md" "dist/${ARCHIVE_NAME}/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/${ARCHIVE_NAME}" -DestinationPath "dist/${ARCHIVE_NAME}.zip"
          echo "ASSET=${ARCHIVE_NAME}.zip" >> $env:GITHUB_ENV

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          else
            sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            dist/${{ env.ASSET }}
            dist/${{ env.ASSET }}.sha256

  build-gui:
    name: Build GUI (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: gui-${{ matrix.target }}

      - name: Build GUI
        run: cargo build -p bifrost-gui --release --target ${{ matrix.target }}

      - name: Create macOS App Bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          APP_NAME="Bifrost"
          ARCHIVE_NAME="bifrost-gui-v${VERSION}-${{ matrix.target }}"
          
          mkdir -p "dist/${APP_NAME}.app/Contents/MacOS"
          mkdir -p "dist/${APP_NAME}.app/Contents/Resources"
          
          cp "target/${{ matrix.target }}/release/bifrost-gui" "dist/${APP_NAME}.app/Contents/MacOS/"
          cp "assets/bifrost.icns" "dist/${APP_NAME}.app/Contents/Resources/AppIcon.icns"
          
          cat > "dist/${APP_NAME}.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>bifrost-gui</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleIdentifier</key>
              <string>com.bifrost.proxy</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Bifrost</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          cd dist
          tar -czvf "${ARCHIVE_NAME}.tar.gz" "${APP_NAME}.app"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package Windows GUI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $ARCHIVE_NAME = "bifrost-gui-v${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/${ARCHIVE_NAME}"
          Copy-Item "target/${{ matrix.target }}/release/bifrost-gui.exe" "dist/${ARCHIVE_NAME}/"
          Compress-Archive -Path "dist/${ARCHIVE_NAME}" -DestinationPath "dist/${ARCHIVE_NAME}.zip"
          echo "ASSET=${ARCHIVE_NAME}.zip" >> $env:GITHUB_ENV

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          else
            sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.target }}
          path: |
            dist/${{ env.ASSET }}
            dist/${{ env.ASSET }}.sha256

  release:
    name: Create Release
    needs: [prepare, build-cli, build-gui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          
          if [[ -n "$PREV_TAG" ]]; then
            echo "## What's Changed" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            
            echo "### 🚀 Features" >> CHANGELOG.md
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --grep="^feat" >> CHANGELOG.md || true
            echo "" >> CHANGELOG.md
            
            echo "### 🐛 Bug Fixes" >> CHANGELOG.md
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --grep="^fix" >> CHANGELOG.md || true
            echo "" >> CHANGELOG.md
            
            echo "### 📝 Other Changes" >> CHANGELOG.md
            git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --invert-grep --grep="^feat" --grep="^fix" >> CHANGELOG.md || true
            echo "" >> CHANGELOG.md
            
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> CHANGELOG.md
          else
            echo "🎉 Initial release!" > CHANGELOG.md
          fi

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;

      - name: Create combined checksums
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd release
          cat *.sha256 > "bifrost-v${VERSION}-checksums.txt"
          rm -f *.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Bifrost ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          body_path: CHANGELOG.md
          append_body: true
          body: |
            
            ---
            
            ## 📥 Installation
            
            ### Quick Install (Recommended)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install-binary.sh | bash
            ```
            
            ### Homebrew (macOS)
            ```bash
            brew tap hxfdarling/bifrost
            brew install bifrost
            ```
            
            ### Manual Download
            
            #### CLI Version (Command-line with Web UI)
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | x64 | `bifrost-${{ needs.prepare.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux | ARM64 | `bifrost-${{ needs.prepare.outputs.tag }}-aarch64-unknown-linux-gnu.tar.gz` |
            | Linux | ARMv7 | `bifrost-${{ needs.prepare.outputs.tag }}-armv7-unknown-linux-gnueabihf.tar.gz` |
            | macOS | Intel | `bifrost-${{ needs.prepare.outputs.tag }}-x86_64-apple-darwin.tar.gz` |
            | macOS | Apple Silicon | `bifrost-${{ needs.prepare.outputs.tag }}-aarch64-apple-darwin.tar.gz` |
            | Windows | x64 | `bifrost-${{ needs.prepare.outputs.tag }}-x86_64-pc-windows-msvc.zip` |
            | Windows | ARM64 | `bifrost-${{ needs.prepare.outputs.tag }}-aarch64-pc-windows-msvc.zip` |
            
            #### GUI Version (Native Desktop App)
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Intel | `bifrost-gui-${{ needs.prepare.outputs.tag }}-x86_64-apple-darwin.tar.gz` |
            | macOS | Apple Silicon | `bifrost-gui-${{ needs.prepare.outputs.tag }}-aarch64-apple-darwin.tar.gz` |
            | Windows | x64 | `bifrost-gui-${{ needs.prepare.outputs.tag }}-x86_64-pc-windows-msvc.zip` |
            | Windows | ARM64 | `bifrost-gui-${{ needs.prepare.outputs.tag }}-aarch64-pc-windows-msvc.zip` |
            
          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: [prepare, release]
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: hxfdarling/homebrew-bifrost
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ needs.prepare.outputs.version }}",
              "tag": "${{ needs.prepare.outputs.tag }}",
              "is_prerelease": "${{ needs.prepare.outputs.is_prerelease }}"
            }
