name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Pre-release identifier (e.g., alpha, beta, rc)"
        required: false
        type: string
      release_notes:
        description: "Release notes (supports markdown, leave empty for auto-generated)"
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
            IS_PRERELEASE=$([[ "$TAG" =~ (alpha|beta|rc) ]] && echo "true" || echo "false")
          else
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST_VERSION="${LATEST_TAG#v}"
            
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_VERSION%%-*}"
            MAJOR=${MAJOR:-0}
            MINOR=${MINOR:-0}
            PATCH=${PATCH:-0}
            
            case "${{ inputs.version_type }}" in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
            
            if [[ -n "${{ inputs.prerelease }}" ]]; then
              VERSION="${VERSION}-${{ inputs.prerelease }}"
              IS_PRERELEASE="true"
            else
              IS_PRERELEASE="false"
            fi
            
            TAG="v${VERSION}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"
          echo "🏷️  Tag: ${TAG}"
          echo "🚀 Pre-release: ${IS_PRERELEASE}"

      - name: Check Cargo.toml version
        id: cargo_version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "cargo_version=${CARGO_VERSION}" >> $GITHUB_OUTPUT

          if [[ "${CARGO_VERSION}" == "${VERSION}" ]]; then
            echo "✅ Cargo.toml version matches tag: ${VERSION}"
          else
            echo "ℹ️  Cargo.toml version (${CARGO_VERSION}) differs from tag (${VERSION})"
            echo "   Version will be injected at build time via BIFROST_VERSION env var"
          fi

      - name: Update Cargo.toml versions (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          BIFROST_VERSION: ${{ steps.version.outputs.version }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          echo "🔄 Updating Cargo.toml versions to ${VERSION}..."

          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml

          for crate_dir in crates/*/; do
            if [[ -f "${crate_dir}Cargo.toml" ]]; then
              sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" "${crate_dir}Cargo.toml"
            fi
          done

          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" desktop/src-tauri/Cargo.toml

          node scripts/sync-tauri-version.mjs

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: bump version to ${VERSION}"
          git push origin HEAD:main

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
            cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Build frontend
        run: pnpm run build
        working-directory: web

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        env:
          SKIP_FRONTEND_BUILD: "1"
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
        run: cargo build -p bifrost-cli --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        env:
          SKIP_FRONTEND_BUILD: "1"
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
        run: cross build -p bifrost-cli --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCHIVE_NAME="bifrost-v${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/bifrost" "dist/${ARCHIVE_NAME}/"
          cp README.md "dist/${ARCHIVE_NAME}/" 2>/dev/null || true
          cd dist
          tar -czvf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $ARCHIVE_NAME = "bifrost-v${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/${ARCHIVE_NAME}"
          Copy-Item "target/${{ matrix.target }}/release/bifrost.exe" "dist/${ARCHIVE_NAME}/"
          Copy-Item "README.md" "dist/${ARCHIVE_NAME}/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "dist/${ARCHIVE_NAME}" -DestinationPath "dist/${ARCHIVE_NAME}.zip"
          echo "ASSET=${ARCHIVE_NAME}.zip" >> $env:GITHUB_ENV

      - name: Generate checksum
        shell: bash
        run: |
          cd dist
          if [ "${{ runner.os }}" = "macOS" ]; then
            shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          else
            sha256sum "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            dist/${{ env.ASSET }}
            dist/${{ env.ASSET }}.sha256

  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundle_ext: dmg
          - os: macos-15
            target: aarch64-apple-darwin
            bundle_ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_ext: msi
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            bundle_ext: msi
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            web/pnpm-lock.yaml

      - name: Install root dependencies
        run: pnpm install --frozen-lockfile

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Sync desktop version metadata
        env:
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
        run: node scripts/sync-tauri-version.mjs

      - name: Rewrite desktop version metadata for Windows MSI
        if: runner.os == 'Windows' && matrix.bundle_ext == 'msi'
        env:
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
        run: node scripts/sync-tauri-version.mjs --msi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}

      - name: Build desktop frontend
        run: pnpm --dir web run build:desktop

      - name: Build bundled CLI backend
        env:
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
        run: cargo build -p bifrost-cli --release --target ${{ matrix.target }}

      - name: Prepare desktop sidecar
        run: node scripts/prepare-tauri-sidecar.mjs release ${{ matrix.target }}

      - name: Resolve macOS signing mode
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "APPLE_SIGNING_IDENTITY=-" >> "${GITHUB_ENV}"
          echo "Using ad-hoc signing for macOS desktop bundle to avoid Gatekeeper damaged-app errors."

      - name: Build desktop bundle
        if: runner.os != 'macOS'
        env:
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: pnpm exec tauri build --config desktop/src-tauri/tauri.conf.json --target ${{ matrix.target }}

      - name: Build macOS desktop app bundle
        if: runner.os == 'macOS'
        env:
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: pnpm exec tauri build --config desktop/src-tauri/tauri.conf.json --target ${{ matrix.target }} --bundles app

      - name: Re-sign macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH=$(find "desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [[ -z "${APP_PATH}" ]]; then
            echo "macOS app bundle not found"
            exit 1
          fi

          bash scripts/resign-macos-app.sh "${APP_PATH}"

      - name: Package macOS desktop dmg
        if: runner.os == 'macOS'
        shell: bash
        env:
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          APP_PATH=$(find "desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [[ -z "${APP_PATH}" ]]; then
            echo "macOS app bundle not found"
            exit 1
          fi

          ARCH_SUFFIX=$( [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]] && echo x64 || echo aarch64 )
          DMG_PATH="desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Bifrost_${BIFROST_VERSION}_${ARCH_SUFFIX}.dmg"
          bash scripts/package-macos-dmg.sh "${APP_PATH}" "${DMG_PATH}"

      - name: Package desktop artifact
        shell: bash
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          EXT="${{ matrix.bundle_ext }}"
          mkdir -p dist
          BUNDLE_PATH=$(find "desktop/src-tauri/target/${TARGET}/release/bundle" -type f -name "*.${EXT}" | head -n 1)
          if [[ -z "${BUNDLE_PATH}" ]]; then
            echo "Desktop bundle not found for extension ${EXT}"
            exit 1
          fi
          ASSET_NAME="bifrost-desktop-v${VERSION}-${TARGET}.${EXT}"
          cp "${BUNDLE_PATH}" "dist/${ASSET_NAME}"
          echo "ASSET=${ASSET_NAME}" >> $GITHUB_ENV

      - name: Package desktop artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $TARGET = "${{ matrix.target }}"
          $EXT = "${{ matrix.bundle_ext }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $bundle = Get-ChildItem "desktop/src-tauri/target/$TARGET/release/bundle" -Recurse -Filter "*.$EXT" | Select-Object -First 1
          if (-not $bundle) {
            Write-Error "Desktop bundle not found for extension $EXT"
            exit 1
          }
          $asset = "bifrost-desktop-v$VERSION-$TARGET.$EXT"
          Copy-Item $bundle.FullName "dist/$asset"
          "ASSET=$asset" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Generate checksum
        shell: bash
        if: runner.os != 'Windows'
        run: |
          cd dist
          shasum -a 256 "${{ env.ASSET }}" > "${{ env.ASSET }}.sha256"

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = Get-FileHash "dist/${{ env.ASSET }}" -Algorithm SHA256
          "$($hash.Hash.ToLower())  ${{ env.ASSET }}" | Out-File -FilePath "dist/${{ env.ASSET }}.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            dist/${{ env.ASSET }}
            dist/${{ env.ASSET }}.sha256

  release:
    name: Create Release
    needs: [prepare, build-cli, build-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          RELEASE_NOTES='${{ inputs.release_notes }}'

          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          : > CHANGELOG.md

          if [[ -n "$RELEASE_NOTES" ]]; then
            echo "## ✨ Highlights" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "$RELEASE_NOTES" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          fi

          if [[ -n "$PREV_TAG" ]]; then
            echo "## What's Changed" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            
            FEATURES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --grep="^feat" 2>/dev/null || true)
            if [[ -n "$FEATURES" ]]; then
              echo "### 🚀 Features" >> CHANGELOG.md
              echo "$FEATURES" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi
            
            FIXES=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --grep="^fix" 2>/dev/null || true)
            if [[ -n "$FIXES" ]]; then
              echo "### 🐛 Bug Fixes" >> CHANGELOG.md
              echo "$FIXES" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi
            
            OTHERS=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --invert-grep --grep="^feat" --grep="^fix" 2>/dev/null || true)
            if [[ -n "$OTHERS" ]]; then
              echo "### 📝 Other Changes" >> CHANGELOG.md
              echo "$OTHERS" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi
            
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> CHANGELOG.md
          elif [[ -z "$RELEASE_NOTES" ]]; then
            echo "🎉 Initial release!" >> CHANGELOG.md
          fi

      - name: Collect release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.dmg" -o -name "*.msi" -o -name "*.sha256" \) -exec cp {} release/ \;

      - name: Create combined checksums
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cd release
          cat *.sha256 > "bifrost-v${VERSION}-checksums.txt"
          rm -f *.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Bifrost ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
          body_path: CHANGELOG.md
          append_body: true
          body: |

            ---

            ## 📥 Installation

            ### Quick Install (Recommended)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install-binary.sh | bash
            ```

            ### npm
            ```bash
            npm install -g @bifrost-proxy/bifrost
            ```

            ### npx (no install)
            ```bash
            npx @bifrost-proxy/bifrost start
            ```

            ### Homebrew (macOS)
            ```bash
            brew tap bifrost-proxy/bifrost
            brew install bifrost
            ```

            ### Desktop App (macOS via Homebrew Cask)
            ```bash
            brew tap bifrost-proxy/bifrost
            brew install --cask bifrost-desktop
            ```

            ### Manual Download

            CLI:
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | Linux | x64 | `bifrost-${{ needs.prepare.outputs.tag }}-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux | ARM64 | `bifrost-${{ needs.prepare.outputs.tag }}-aarch64-unknown-linux-gnu.tar.gz` |
            | Linux | ARMv7 | `bifrost-${{ needs.prepare.outputs.tag }}-armv7-unknown-linux-gnueabihf.tar.gz` |
            | Linux | x64 (musl/static) | `bifrost-${{ needs.prepare.outputs.tag }}-x86_64-unknown-linux-musl.tar.gz` |
            | Linux | ARM64 (musl/static) | `bifrost-${{ needs.prepare.outputs.tag }}-aarch64-unknown-linux-musl.tar.gz` |
            | macOS | Intel | `bifrost-${{ needs.prepare.outputs.tag }}-x86_64-apple-darwin.tar.gz` |
            | macOS | Apple Silicon | `bifrost-${{ needs.prepare.outputs.tag }}-aarch64-apple-darwin.tar.gz` |
            | Windows | x64 | `bifrost-${{ needs.prepare.outputs.tag }}-x86_64-pc-windows-msvc.zip` |
            | Windows | ARM64 | `bifrost-${{ needs.prepare.outputs.tag }}-aarch64-pc-windows-msvc.zip` |

            Desktop:
            | Platform | Architecture | Download |
            |----------|--------------|----------|
            | macOS | Intel | `bifrost-desktop-${{ needs.prepare.outputs.tag }}-x86_64-apple-darwin.dmg` |
            | macOS | Apple Silicon | `bifrost-desktop-${{ needs.prepare.outputs.tag }}-aarch64-apple-darwin.dmg` |
            | Windows | x64 | `bifrost-desktop-${{ needs.prepare.outputs.tag }}-x86_64-pc-windows-msvc.msi` |
            | Windows | ARM64 | `bifrost-desktop-${{ needs.prepare.outputs.tag }}-aarch64-pc-windows-msvc.msi` |

          files: |
            release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: [prepare, release, build-desktop]
    runs-on: ubuntu-latest
    env:
      MAX_VERSIONED_FORMULAS: 5
    steps:
      - name: Checkout homebrew-bifrost
        uses: actions/checkout@v4
        with:
          repository: bifrost-proxy/homebrew-bifrost
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-bifrost

      - name: Download checksums
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          curl -sL "https://github.com/bifrost-proxy/bifrost/releases/download/${TAG}/bifrost-${TAG}-checksums.txt" -o checksums.txt

          INTEL_SHA=$(grep "x86_64-apple-darwin.tar.gz" checksums.txt | awk '{print $1}')
          ARM_SHA=$(grep "aarch64-apple-darwin.tar.gz" checksums.txt | awk '{print $1}')
          DESKTOP_INTEL_SHA=$(grep "bifrost-desktop-${TAG}-x86_64-apple-darwin.dmg" checksums.txt | awk '{print $1}')
          DESKTOP_ARM_SHA=$(grep "bifrost-desktop-${TAG}-aarch64-apple-darwin.dmg" checksums.txt | awk '{print $1}')

          echo "INTEL_SHA=${INTEL_SHA}" >> $GITHUB_ENV
          echo "ARM_SHA=${ARM_SHA}" >> $GITHUB_ENV
          echo "DESKTOP_INTEL_SHA=${DESKTOP_INTEL_SHA}" >> $GITHUB_ENV
          echo "DESKTOP_ARM_SHA=${DESKTOP_ARM_SHA}" >> $GITHUB_ENV

      - name: Generate formula content
        id: formula
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IS_PRERELEASE="${{ needs.prepare.outputs.is_prerelease }}"

          generate_formula() {
            local class_name="$1"
            local version="$2"
            local intel_sha="$3"
            local arm_sha="$4"
            
            cat << FORMULA
          class ${class_name} < Formula
            desc "High-performance HTTP/HTTPS/SOCKS5 proxy server written in Rust"
            homepage "https://github.com/bifrost-proxy/bifrost"
            version "${version}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/bifrost-proxy/bifrost/releases/download/v#{version}/bifrost-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${intel_sha}"
              end

              on_arm do
                url "https://github.com/bifrost-proxy/bifrost/releases/download/v#{version}/bifrost-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${arm_sha}"
              end
            end

            def install
              bin.install "bifrost"
            end

            def caveats
              <<~EOS
                To start bifrost proxy server:
                  bifrost start

                To start with a specific port:
                  bifrost -p 9900 start

                To enable HTTPS interception, you may need to install the CA certificate:
                  bifrost ca export
                  # Then install the exported certificate to your system trust store

                Web UI available at:
                  http://127.0.0.1:<port>/_bifrost/
              EOS
            end

            test do
              assert_match "bifrost", shell_output("#{bin}/bifrost --version")
            end
          end
          FORMULA
          }

          generate_formula "Bifrost" "${VERSION}" "${INTEL_SHA}" "${ARM_SHA}" > homebrew-bifrost/Formula/bifrost.rb

          mkdir -p homebrew-bifrost/Casks
          cat > homebrew-bifrost/Casks/bifrost-desktop.rb << CASK
          cask "bifrost-desktop" do
            arch arm: "aarch64-apple-darwin", intel: "x86_64-apple-darwin"
            version "${VERSION}"
            sha256 arm: "${DESKTOP_ARM_SHA}", intel: "${DESKTOP_INTEL_SHA}"

            url "https://github.com/bifrost-proxy/bifrost/releases/download/v#{version}/bifrost-desktop-v#{version}-#{arch}.dmg"
            name "Bifrost"
            desc "Desktop client for the Bifrost proxy"
            homepage "https://github.com/bifrost-proxy/bifrost"

            app "Bifrost.app"
          end
          CASK

          if [[ "${IS_PRERELEASE}" != "true" ]]; then
            BASE_VERSION="${VERSION%%-*}"
            VERSIONED_CLASS_NAME="BifrostAT${BASE_VERSION//\./_}"
            generate_formula "${VERSIONED_CLASS_NAME}" "${VERSION}" "${INTEL_SHA}" "${ARM_SHA}" > "homebrew-bifrost/Formula/bifrost@${BASE_VERSION}.rb"
            echo "Created versioned formula: bifrost@${BASE_VERSION}.rb"
          fi

      - name: Cleanup old versioned formulas
        run: |
          cd homebrew-bifrost/Formula

          VERSIONED_FORMULAS=$(ls -1 bifrost@*.rb 2>/dev/null | sort -V -r || true)
          COUNT=0

          for formula in $VERSIONED_FORMULAS; do
            COUNT=$((COUNT + 1))
            if [[ $COUNT -gt $MAX_VERSIONED_FORMULAS ]]; then
              echo "Removing old formula: $formula"
              rm -f "$formula"
            fi
          done

      - name: Commit and push
        working-directory: homebrew-bifrost
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          IS_PRERELEASE="${{ needs.prepare.outputs.is_prerelease }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A Formula/ Casks/

          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            COMMIT_MSG="Update bifrost to v${VERSION} (pre-release)"
          else
            COMMIT_MSG="Update bifrost to v${VERSION} and add versioned formula"
          fi

          git diff --cached --quiet || git commit -m "${COMMIT_MSG}"
          git push

  publish-npm:
    name: Publish npm Packages
    needs: [prepare, build-cli, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download all CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cli-*

      - name: Verify artifacts
        run: |
          echo "📂 Downloaded artifacts:"
          find artifacts -type f | sort
          echo ""
          EXPECTED_TARGETS=(
            "x86_64-unknown-linux-gnu"
            "aarch64-unknown-linux-gnu"
            "armv7-unknown-linux-gnueabihf"
            "x86_64-unknown-linux-musl"
            "aarch64-unknown-linux-musl"
            "x86_64-apple-darwin"
            "aarch64-apple-darwin"
            "x86_64-pc-windows-msvc"
            "aarch64-pc-windows-msvc"
          )
          MISSING=0
          for target in "${EXPECTED_TARGETS[@]}"; do
            if [ ! -d "artifacts/cli-${target}" ]; then
              echo "❌ Missing artifact: cli-${target}"
              MISSING=$((MISSING + 1))
            else
              echo "✅ Found: cli-${target}"
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "❌ ${MISSING} platform artifact(s) missing. Cannot publish npm packages."
            exit 1
          fi
          echo ""
          echo "✅ All 9 platform artifacts present."

      - name: Publish to npm
        env:
          BIFROST_VERSION: ${{ needs.prepare.outputs.version }}
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/npm-publish.mjs
