          CARGO_TARGET_DIR: target/cross-musl-aarch64
        run: cross build -p bifrost-cli --release --target aarch64-unknown-linux-musl

  build-desktop-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            web/pnpm-lock.yaml
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-build-${{ matrix.target }}
          save-if: always()
      - name: Build workspace
        run: cargo build --workspace --release --target ${{ matrix.target }}
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-release-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bifrost
          retention-days: 1

