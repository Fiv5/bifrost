        shell: bash
        run: |
          echo "=== E2E Report Directory ==="
          find "$BIFROST_E2E_REPORT_DIR" -type f -name "*.log" 2>/dev/null | head -20
          echo ""
          for logfile in $(find "$BIFROST_E2E_REPORT_DIR" -type f -name "*.log" 2>/dev/null | head -10); do
            echo "=== $logfile ==="
            tail -100 "$logfile"
            echo ""
          done
          echo "=== E2E Data Directory ==="
          find "$BIFROST_DATA_DIR" -type f -name "*.log" 2>/dev/null | head -20
      - name: Upload E2E logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-runner-logs-aarch64-apple-darwin
          path: |
            ${{ github.workspace }}/.e2e-reports/
            ${{ github.workspace }}/.bifrost-e2e-ci/
          retention-days: 7
          if-no-files-found: ignore

  bundle-desktop-macos:
    name: Bundle macOS (${{ matrix.target }})
    needs: [build-desktop-macos]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            web/pnpm-lock.yaml
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-bundle-${{ matrix.target }}
      - name: Download workspace binaries
        uses: actions/download-artifact@v4
        with:
          name: bifrost-release-${{ matrix.target }}
          path: target/${{ matrix.target }}/release
      - name: Make binary executable
        run: chmod +x target/${{ matrix.target }}/release/bifrost
      - name: Build desktop frontend
        run: pnpm --dir web run build:desktop
      - name: Prepare desktop sidecar
        run: node scripts/prepare-tauri-sidecar.mjs release ${{ matrix.target }}
      - name: Resolve macOS signing mode
        shell: bash
        run: |
          echo "APPLE_SIGNING_IDENTITY=-" >> "${GITHUB_ENV}"
          echo "Using ad-hoc signing for macOS desktop CI bundle validation."
      - name: Build macOS desktop bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: pnpm exec tauri build --config desktop/src-tauri/tauri.conf.json --target ${{ matrix.target }} --bundles app
      - name: Re-sign macOS app bundle
        shell: bash
        run: |
          APP_PATH=$(find "desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [[ -z "${APP_PATH}" ]]; then
            echo "macOS app bundle not found"
            exit 1
          fi

          bash scripts/resign-macos-app.sh "${APP_PATH}"
      - name: Package macOS desktop dmg
        shell: bash
        run: |
          APP_PATH=$(find "desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [[ -z "${APP_PATH}" ]]; then
            echo "macOS app bundle not found"
            exit 1
          fi

          ARCH_SUFFIX=$( [[ "${{ matrix.target }}" == "x86_64-apple-darwin" ]] && echo x64 || echo aarch64 )
          DMG_PATH="desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Bifrost_ci_${ARCH_SUFFIX}.dmg"
          bash scripts/package-macos-dmg.sh "${APP_PATH}" "${DMG_PATH}"
      - name: Validate macOS desktop bundle
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          APP_PATH=$(find "desktop/src-tauri/target/${TARGET}/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [[ -z "${APP_PATH}" ]]; then
            echo "macOS app bundle not found"
            exit 1
          fi

          DMG_PATH=$(find "desktop/src-tauri/target/${TARGET}/release/bundle" -type f -name "*.dmg" | head -n 1)
          if [[ -z "${DMG_PATH}" ]]; then
            echo "macOS dmg bundle not found"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "${APP_PATH}"
          mkdir -p dist
          cp "${DMG_PATH}" "dist/bifrost-desktop-${TARGET}.dmg"
      - name: Upload macOS desktop bundle
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-desktop-${{ matrix.target }}
          path: dist/bifrost-desktop-${{ matrix.target }}.dmg
          if-no-files-found: error

  build-desktop-windows:
    name: Build Windows (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            web/pnpm-lock.yaml
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-windows-${{ matrix.target }}
          save-if: always()
      - name: Build workspace
        run: cargo build --workspace --release --target ${{ matrix.target }}
      - name: Build desktop frontend
        run: pnpm --dir web run build:desktop
      - name: Prepare desktop sidecar
        run: node scripts/prepare-tauri-sidecar.mjs release ${{ matrix.target }}
      - name: Check desktop client
        run: cargo check --manifest-path desktop/src-tauri/Cargo.toml --target ${{ matrix.target }}
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-release-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/bifrost.exe
          retention-days: 1

  e2e-windows-rules:
    name: E2E Rules (${{ matrix.target }})
    needs: [build-desktop-windows]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    env:
      BIFROST_DATA_DIR: ${{ github.workspace }}/.bifrost-e2e-ci
      BIFROST_E2E_REPORT_DIR: ${{ github.workspace }}/.e2e-reports
      BIFROST_E2E_RULE_JOBS: "2"
      BIFROST_E2E_RETRY_FAILED_ONCE: "1"
      BIFROST_E2E_HTTP_RETRIES: "2"
      BIFROST_E2E_FIXTURE_TIMEOUT: "90"
      BIFROST_E2E_RETRY_FIXTURE_TIMEOUT: "60"
      BIFROST_E2E_RETRY_BUDGET_SECS: "180"
      BIFROST_E2E_MAX_RETRY_SUITES: "6"
      BIFROST_E2E_SUITE_TIMEOUT: "1800"
      TIMEOUT: "90"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-${{ matrix.target }}
      - name: Install jq
        shell: powershell
        run: choco install jq -y
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: bifrost-release-${{ matrix.target }}
          path: target/release
      - name: Verify binary
        shell: bash
        run: |
          echo "=== Downloaded files ==="
          ls -la target/release/ || true
          echo "=== Version check ==="
          target/release/bifrost.exe --version 2>&1 || echo "bifrost.exe --version failed"
      - name: E2E rules tests
        shell: bash
        run: bash scripts/ci/run-e2e-rules.sh
      - name: Dump failed suite logs
        if: failure()
        shell: bash
        run: |
          echo "=== E2E Report Directory ==="
          find "$BIFROST_E2E_REPORT_DIR" -type f -name "*.log" 2>/dev/null | head -20
          echo ""
          for logfile in $(find "$BIFROST_E2E_REPORT_DIR" -type f -name "*.log" 2>/dev/null | head -10); do
            echo "=== $logfile ==="
            tail -100 "$logfile"
            echo ""
          done
          echo "=== E2E Data Directory ==="
          find "$BIFROST_DATA_DIR" -type f -name "*.log" 2>/dev/null | head -20
      - name: Upload E2E logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-rules-logs-${{ matrix.target }}
          path: |
            ${{ github.workspace }}/.e2e-reports/
            ${{ github.workspace }}/.bifrost-e2e-ci/
          retention-days: 7
          if-no-files-found: ignore

