            echo "=== $logfile ==="
            tail -100 "$logfile"
            echo ""
          done
          echo "=== E2E Data Directory ==="
          find "$BIFROST_DATA_DIR" -type f -name "*.log" 2>/dev/null | head -20
      - name: Upload E2E logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-runner-logs-linux
          path: |
            ${{ github.workspace }}/.e2e-reports/
            ${{ github.workspace }}/.bifrost-e2e-ci/
          retention-days: 7
          if-no-files-found: ignore

  build-linux-x86:
    name: Linux Build (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86_64
      - name: Build Linux workspace
        run: cargo build --workspace --release --target x86_64-unknown-linux-gnu

  build-linux-aarch64:
    name: Linux Build (aarch64)
