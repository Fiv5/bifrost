name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "desktop/**"
      - "scripts/**"
      - "web/**"
      - "packages/**"
      - "e2e-tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/*.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "desktop/**"
      - "scripts/**"
      - "web/**"
      - "packages/**"
      - "e2e-tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/*.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rust Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml --all -- --check

  clippy:
    name: Rust Clippy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: always()
      - name: Unit and integration tests
        run: cargo test --workspace --all-features

  coverage:
    name: Unit-Test Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: always()
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage (LCOV)
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info
      - name: Generate coverage summary
        run: cargo llvm-cov --workspace --all-features --json --summary-only > coverage-summary.json
      - name: Print coverage summary
        run: |
          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov --workspace --all-features 2>&1 | tee -a "$GITHUB_STEP_SUMMARY" || true
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 7

  build-e2e:
    name: Build E2E Binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: always()
      - name: Build release binary
        run: SKIP_FRONTEND_BUILD=1 cargo build --release --bin bifrost
      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-release-linux
          path: target/release/bifrost
          retention-days: 1

  e2e-rules:
    name: E2E Rules (Linux)
    needs: [build-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BIFROST_DATA_DIR: ${{ github.workspace }}/.bifrost-e2e-ci
      BIFROST_E2E_REPORT_DIR: ${{ github.workspace }}/.e2e-reports
      BIFROST_E2E_RULE_JOBS: "4"
      BIFROST_E2E_RETRY_FAILED_ONCE: "1"
      BIFROST_E2E_HTTP_RETRIES: "2"
      TIMEOUT: "90"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: bifrost-release-linux
          path: target/release
      - name: Make binary executable
        run: chmod +x target/release/bifrost
      - name: E2E rules tests
        shell: bash
        run: bash scripts/ci/run-e2e-rules.sh
      - name: Dump failed suite logs
        if: failure()
        shell: bash
        run: |
          echo "=== E2E Report Directory ==="
          find "$BIFROST_E2E_REPORT_DIR" -type f -name "*.log" 2>/dev/null | head -20
          echo ""
          for logfile in $(find "$BIFROST_E2E_REPORT_DIR" -type f -name "*.log" 2>/dev/null | head -10); do
            echo "=== $logfile ==="
            tail -100 "$logfile"
            echo ""
          done
          echo "=== E2E Data Directory ==="
          find "$BIFROST_DATA_DIR" -type f -name "*.log" 2>/dev/null | head -20
      - name: Upload E2E logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-rules-logs-linux
          path: |
            ${{ github.workspace }}/.e2e-reports/
            ${{ github.workspace }}/.bifrost-e2e-ci/
          retention-days: 7
          if-no-files-found: ignore

  e2e-shell:
    name: E2E Shell (Linux)
    needs: [build-e2e]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      BIFROST_DATA_DIR: ${{ github.workspace }}/.bifrost-e2e-ci
      BIFROST_E2E_REPORT_DIR: ${{ github.workspace }}/.e2e-reports
      BIFROST_E2E_SHELL_JOBS: "8"
      BIFROST_E2E_RETRY_FAILED_ONCE: "1"
      BIFROST_E2E_HTTP_RETRIES: "2"
      TIMEOUT: "90"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Install sync-server dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/bifrost-sync-server
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Download release binary
        uses: actions/download-artifact@v4
        with:
          name: bifrost-release-linux
          path: target/release
      - name: Make binary executable
        run: chmod +x target/release/bifrost
      - name: E2E shell tests
        shell: bash
        run: bash scripts/ci/run-e2e-shell.sh
      - name: Dump failed suite logs
        if: failure()
        shell: bash
        run: |
          echo "=== E2E Report Directory ==="
          find "$BIFROST_E2E_REPORT_DIR" -type f -name "*.log" 2>/dev/null | head -20
          echo ""
          for logfile in $(find "$BIFROST_E2E_REPORT_DIR" -type f -name "*.log" 2>/dev/null | head -10); do
            echo "=== $logfile ==="
            tail -100 "$logfile"
            echo ""
          done
          echo "=== E2E Data Directory ==="
          find "$BIFROST_DATA_DIR" -type f -name "*.log" 2>/dev/null | head -20
      - name: Upload E2E logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-shell-logs-linux
          path: |
            ${{ github.workspace }}/.e2e-reports/
            ${{ github.workspace }}/.bifrost-e2e-ci/
          retention-days: 7
          if-no-files-found: ignore

  e2e-runner:
