name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "desktop/**"
      - "scripts/**"
      - "web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/*.yml"
  pull_request:
    branches: [main]
    paths:
      - "**.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "desktop/**"
      - "scripts/**"
      - "web/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/*.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      BIFROST_DATA_DIR: ${{ github.workspace }}/.bifrost
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace --all-features

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            cross: false
          - os: macos-15
            target: aarch64-apple-darwin
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        if: ${{ !matrix.cross }}
        run: cargo build --workspace --release --target ${{ matrix.target }}
      - name: Build (cross)
        if: matrix.cross
        env:
          SKIP_FRONTEND_BUILD: "1"
        run: cross build -p bifrost-cli --release --target ${{ matrix.target }}

  desktop-check:
    name: Desktop Check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            target: x86_64-apple-darwin
            bundle_ext: dmg
          - os: macos-15
            target: aarch64-apple-darwin
            bundle_ext: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: |
            pnpm-lock.yaml
            web/pnpm-lock.yaml
      - name: Install root dependencies
        run: pnpm install --frozen-lockfile
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: desktop-${{ matrix.target }}
      - name: Build desktop frontend
        run: pnpm --dir web run build:desktop
      - name: Build bundled CLI backend
        run: cargo build -p bifrost-cli --release --target ${{ matrix.target }}
      - name: Prepare desktop sidecar
        run: node scripts/prepare-tauri-sidecar.mjs release ${{ matrix.target }}
      - name: Resolve macOS signing mode
        if: runner.os == 'macOS'
        shell: bash
        run: |
          echo "APPLE_SIGNING_IDENTITY=-" >> "${GITHUB_ENV}"
          echo "Using ad-hoc signing for macOS desktop CI bundle validation."
      - name: Build macOS desktop bundle
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: pnpm exec tauri build --config desktop/src-tauri/tauri.conf.json --target ${{ matrix.target }}
      - name: Re-sign macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_PATH=$(find "desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [[ -z "${APP_PATH}" ]]; then
            echo "macOS app bundle not found"
            exit 1
          fi

          bash scripts/resign-macos-app.sh "${APP_PATH}"
      - name: Validate macOS desktop bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          APP_PATH=$(find "desktop/src-tauri/target/${TARGET}/release/bundle/macos" -maxdepth 1 -type d -name "*.app" | head -n 1)
          if [[ -z "${APP_PATH}" ]]; then
            echo "macOS app bundle not found"
            exit 1
          fi

          DMG_PATH=$(find "desktop/src-tauri/target/${TARGET}/release/bundle" -type f -name "*.dmg" | head -n 1)
          if [[ -z "${DMG_PATH}" ]]; then
            echo "macOS dmg bundle not found"
            exit 1
          fi

          codesign --verify --deep --strict --verbose=4 "${APP_PATH}"
          mkdir -p dist
          cp "${DMG_PATH}" "dist/bifrost-desktop-${TARGET}.dmg"
      - name: Upload macOS desktop bundle
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-desktop-${{ matrix.target }}
          path: dist/bifrost-desktop-${{ matrix.target }}.dmg
          if-no-files-found: error
      - name: Check desktop client
        if: runner.os != 'macOS'
        run: cargo check --manifest-path desktop/src-tauri/Cargo.toml --target ${{ matrix.target }}
