      BIFROST_E2E_RETRY_FAILED_ONCE: "1"
      BIFROST_E2E_HTTP_RETRIES: "2"
      TIMEOUT: "90"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
