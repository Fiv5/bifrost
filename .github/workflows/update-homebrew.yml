name: Update Homebrew Formula

on:
  repository_dispatch:
    types: [update-formula]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (without v prefix)"
        required: true
        type: string
      tag:
        description: "Git tag (with v prefix)"
        required: true
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version info
        id: info
        run: |
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            VERSION="${{ github.event.client_payload.version }}"
            TAG="${{ github.event.client_payload.tag }}"
          else
            VERSION="${{ inputs.version }}"
            TAG="${{ inputs.tag }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Download checksums
        run: |
          TAG="${{ steps.info.outputs.tag }}"
          VERSION="${{ steps.info.outputs.version }}"
          
          curl -sL "https://github.com/bifrost-proxy/bifrost/releases/download/${TAG}/bifrost-${TAG}-checksums.txt" -o checksums.txt
          
          INTEL_SHA=$(grep "x86_64-apple-darwin.tar.gz" checksums.txt | awk '{print $1}')
          ARM_SHA=$(grep "aarch64-apple-darwin.tar.gz" checksums.txt | awk '{print $1}')
          
          echo "INTEL_SHA=${INTEL_SHA}" >> $GITHUB_ENV
          echo "ARM_SHA=${ARM_SHA}" >> $GITHUB_ENV

      - name: Update Formula
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          
          cat > Formula/bifrost.rb << EOF
          class Bifrost < Formula
            desc "High-performance HTTP/HTTPS/SOCKS5 proxy server written in Rust"
            homepage "https://github.com/bifrost-proxy/bifrost"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_intel do
                url "https://github.com/bifrost-proxy/bifrost/releases/download/v#{version}/bifrost-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${INTEL_SHA}"
              end

              on_arm do
                url "https://github.com/bifrost-proxy/bifrost/releases/download/v#{version}/bifrost-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM_SHA}"
              end
            end

            def install
              bin.install "bifrost"
            end

            def caveats
              <<~EOS
                To start bifrost proxy server:
                  bifrost start

                To start with a specific port:
                  bifrost -p 9900 start

                To enable HTTPS interception, you may need to install the CA certificate:
                  bifrost ca export
                  # Then install the exported certificate to your system trust store

                Web UI available at:
                  http://127.0.0.1:<port>/_bifrost/
              EOS
            end

            test do
              assert_match "bifrost", shell_output("#{bin}/bifrost --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          VERSION="${{ steps.info.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bifrost.rb
          git diff --cached --quiet || git commit -m "Update bifrost to ${VERSION}"
          git push
