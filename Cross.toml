[build.env]
passthrough = [
    "SKIP_FRONTEND_BUILD",
    "CARGO_TERM_COLOR",
]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "apt-get update && apt-get install -y --no-install-recommends clang libclang-dev || (apt-get update && apt-get install -y --fix-missing --no-install-recommends clang libclang-dev)",
]
