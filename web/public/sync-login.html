<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bifrost Sync Login</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fa;
        color: #1f2329;
      }
      .card {
        max-width: 420px;
        background: white;
        border: 1px solid #d9e1ec;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      .muted {
        color: #5b6472;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Signing In</h1>
      <p class="muted" id="message">Waiting for remote sign-in response...</p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token");
      const message = document.getElementById("message");
      if (!token) {
        message.textContent = "Missing login token. Please close this window and try again.";
      } else {
        window.opener?.postMessage(
          {
            type: "bifrost-sync-login",
            token,
          },
          window.location.origin,
        );
        message.textContent = "Login completed. You can close this window.";
        window.setTimeout(() => window.close(), 300);
      }
    </script>
  </body>
  </html>
