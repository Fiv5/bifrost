<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bifrost, the next-generation high-performance proxy server for professional developers."
    />
    <title>Bifrost Proxy</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family:
          'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      }

      #root {
        min-height: 100vh;
      }
    </style>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('bifrost-theme');
          var mode = stored ? JSON.parse(stored).state.mode : 'system';
          var theme = mode === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : mode;
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
