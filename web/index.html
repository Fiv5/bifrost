<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Bifrost, the next-generation high-performance proxy server for professional developers."
    />
    <title>Bifrost Proxy</title>
    <style>
      :root {
        color-scheme: light;
        --startup-bg-top: #edf7f5;
        --startup-bg-bottom: #d6e7ea;
        --startup-accent: #df5c72;
        --startup-accent-soft: rgba(223, 92, 114, 0.18);
        --startup-ink: #16333b;
        --startup-muted: rgba(22, 51, 59, 0.62);
        --startup-glass: rgba(255, 255, 255, 0.34);
        --startup-border: rgba(255, 255, 255, 0.42);
        --startup-shadow: rgba(35, 70, 78, 0.16);
      }

      html[data-theme='dark'] {
        color-scheme: dark;
        --startup-bg-top: #0f1f27;
        --startup-bg-bottom: #081117;
        --startup-accent: #ff8196;
        --startup-accent-soft: rgba(255, 129, 150, 0.16);
        --startup-ink: #f2f7f8;
        --startup-muted: rgba(242, 247, 248, 0.66);
        --startup-glass: rgba(13, 30, 39, 0.48);
        --startup-border: rgba(255, 255, 255, 0.14);
        --startup-shadow: rgba(0, 0, 0, 0.34);
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.72), transparent 42%),
          linear-gradient(155deg, var(--startup-bg-top), var(--startup-bg-bottom));
        font-family:
          'SF Pro Display', 'PingFang SC', 'Helvetica Neue', sans-serif;
      }

      body::before,
      body::after {
        content: '';
        position: fixed;
        inset: auto;
        width: 34vw;
        height: 34vw;
        min-width: 220px;
        min-height: 220px;
        border-radius: 999px;
        filter: blur(18px);
        pointer-events: none;
        z-index: 0;
      }

      body::before {
        top: -8vw;
        left: -10vw;
        background: rgba(255, 255, 255, 0.36);
      }

      body::after {
        right: -12vw;
        bottom: -10vw;
        background: rgba(255, 255, 255, 0.2);
      }

      #startup-splash {
        position: fixed;
        inset: 0;
        z-index: 10;
        pointer-events: none;
      }

      #startup-splash:empty {
        display: none;
      }

      #root {
        min-height: 100vh;
        position: relative;
        z-index: 1;
      }

      .startup-shell {
        position: fixed;
        inset: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        overflow: hidden;
        isolation: isolate;
        pointer-events: auto;
        transition:
          opacity 0.72s ease,
          visibility 0.72s ease;
      }

      .startup-shell::before {
        content: '';
        position: absolute;
        inset: -12%;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.72), transparent 32%),
          radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.52), transparent 28%),
          radial-gradient(circle at 50% 75%, rgba(255, 255, 255, 0.38), transparent 36%);
        opacity: 0.78;
        filter: blur(36px);
        pointer-events: none;
        z-index: 0;
      }

      .startup-panel {
        position: relative;
        z-index: 1;
        width: min(440px, calc(100vw - 48px));
        padding: 36px 30px 30px;
        border: 1px solid var(--startup-border);
        border-radius: 28px;
        background: linear-gradient(145deg, var(--startup-glass), rgba(255, 255, 255, 0.12));
        box-shadow:
          0 26px 60px var(--startup-shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.26);
        backdrop-filter: blur(26px) saturate(150%);
        -webkit-backdrop-filter: blur(26px) saturate(150%);
        display: grid;
        justify-items: center;
        gap: 18px;
        animation: startup-panel-float 3.2s ease-in-out infinite;
      }

      .startup-shell--exiting {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .startup-shell--exiting::before {
        animation: startup-mist-reveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .startup-shell--exiting .startup-panel {
        animation:
          startup-panel-float 3.2s ease-in-out infinite,
          startup-panel-reveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      .startup-icon-wrap {
        width: 128px;
        height: 128px;
        border-radius: 32px;
        display: grid;
        place-items: center;
      }

      .startup-heartbeat {
        width: 92px;
        height: 92px;
        overflow: visible;
      }

      .startup-heart {
        fill: var(--startup-accent);
        transform-box: fill-box;
        transform-origin: center;
        animation: startup-heartbeat 1.4s ease-in-out infinite;
        filter: drop-shadow(0 6px 10px rgba(223, 92, 114, 0.28));
      }

      .startup-line {
        fill: none;
        stroke: var(--startup-ink);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.9;
        stroke-dasharray: 120;
        stroke-dashoffset: 120;
        animation: startup-line-pulse 2.2s linear infinite;
      }

      .startup-title {
        margin: 0;
        color: var(--startup-ink);
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      .startup-subtitle {
        margin: 0;
        color: var(--startup-muted);
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .startup-status {
        margin: 0;
        color: var(--startup-ink);
        font-size: 16px;
        letter-spacing: 0.12em;
      }

      .startup-dots::after {
        content: '';
        display: inline-block;
        width: 1.5em;
        text-align: left;
        animation: startup-dots 1.6s steps(4, end) infinite;
      }

      @keyframes startup-heartbeat {
        0%,
        100% {
          transform: scale(0.96);
        }

        18% {
          transform: scale(1.12);
        }

        32% {
          transform: scale(0.92);
        }

        46% {
          transform: scale(1.08);
        }

        60% {
          transform: scale(0.98);
        }
      }

      @keyframes startup-line-pulse {
        0% {
          stroke-dashoffset: 120;
          opacity: 0.18;
        }

        20% {
          opacity: 1;
        }

        70% {
          opacity: 1;
        }

        100% {
          stroke-dashoffset: -120;
          opacity: 0.18;
        }
      }

      @keyframes startup-panel-float {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-8px);
        }
      }

      @keyframes startup-dots {
        0% {
          content: '';
        }

        25% {
          content: '.';
        }

        50% {
          content: '..';
        }

        75%,
        100% {
          content: '...';
        }
      }

      @keyframes startup-panel-reveal {
        0% {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
          clip-path: inset(0 0 0 0 round 28px);
        }

        100% {
          opacity: 0;
          transform: translateY(-10px) scale(1.06);
          filter: blur(14px);
          clip-path: inset(0 0 100% 0 round 28px);
        }
      }

      @keyframes startup-mist-reveal {
        0% {
          opacity: 0.78;
          transform: scale(1) translate3d(0, 0, 0);
          filter: blur(36px);
        }

        100% {
          opacity: 0;
          transform: scale(1.08) translate3d(0, -4%, 0);
          filter: blur(72px);
        }
      }
    </style>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('bifrost-theme');
          var mode = stored ? JSON.parse(stored).state.mode : 'system';
          var theme = mode === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : mode;
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="startup-splash">
      <div class="startup-shell" aria-label="Bifrost startup screen">
        <div class="startup-panel">
          <div class="startup-icon-wrap" aria-hidden="true">
            <svg class="startup-heartbeat" viewBox="0 0 96 96">
              <path
                class="startup-line"
                d="M12 72h16l7-10 7 18 10-30 8 22 8-10h16"
              />
              <path
                class="startup-heart"
                d="M48 25c5.8-8.1 17.7-9.1 24.3-1.9 6.3 6.8 6.1 17.4-0.2 24.1L48 71 23.9 47.2c-6.4-6.7-6.5-17.3-0.2-24.1C30.3 15.9 42.2 16.9 48 25Z"
              />
            </svg>
          </div>
          <p class="startup-subtitle">Bifrost Proxy</p>
          <p class="startup-status">
            Starting<span class="startup-dots" aria-hidden="true"></span>
          </p>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
